<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GestãoPro • Criar conta</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
    font-family:'Segoe UI',system-ui,-apple-system,sans-serif;
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
    overflow:hidden;
}

/* glow background */
body::before{
    content:"";
    position:absolute;
    width:600px;
    height:600px;
    background:radial-gradient(circle,#00c6ff55,transparent 70%);
    top:-150px;
    left:-150px;
    animation:float 8s ease-in-out infinite;
}

body::after{
    content:"";
    position:absolute;
    width:500px;
    height:500px;
    background:radial-gradient(circle,#00ffb355,transparent 70%);
    bottom:-150px;
    right:-150px;
    animation:float 10s ease-in-out infinite reverse;
}

@keyframes float{
    0%,100%{transform:translateY(0)}
    50%{transform:translateY(25px)}
}

/* card */
.card{
    width:100%;
    max-width:440px;
    padding:36px 32px;
    border-radius:22px;
    background:rgba(255,255,255,0.08);
    backdrop-filter:blur(18px);
    border:1px solid rgba(255,255,255,0.12);
    box-shadow:0 25px 60px rgba(0,0,0,.35);
    animation:fadeUp .8s ease;
}

@keyframes fadeUp{
    from{opacity:0;transform:translateY(40px)}
    to{opacity:1;transform:translateY(0)}
}

/* logo */
.logo{
    text-align:center;
    margin-bottom:22px;
}

.logo img{
    width:150px;
    filter:drop-shadow(0 10px 25px rgba(0,0,0,.5));
}

/* titles */
h2{
    color:#fff;
    text-align:center;
    font-size:1.6rem;
    margin-bottom:6px;
}

.subtitle{
    color:#b9d6df;
    text-align:center;
    font-size:.9rem;
    margin-bottom:24px;
}

/* inputs */
.form-group{margin-bottom:14px;position:relative}

input{
    width:100%;
    padding:14px 42px;
    border-radius:12px;
    border:1px solid rgba(255,255,255,.15);
    background:rgba(255,255,255,.06);
    color:#fff;
    font-size:.95rem;
    transition:.25s;
}

input::placeholder{color:#cfe7ee}

input:focus{
    outline:none;
    border-color:#00c6ff;
    box-shadow:0 0 0 3px #00c6ff33;
}

/* icons */
.icon{
    position:absolute;
    left:14px;
    top:50%;
    transform:translateY(-50%);
    color:#8edfff;
}

/* button */
.btn{
    width:100%;
    margin-top:10px;
    padding:15px;
    border:none;
    border-radius:14px;
    font-weight:700;
    font-size:1rem;
    color:#002b36;
    background:linear-gradient(135deg,#00c6ff,#00ffb3);
    cursor:pointer;
    transition:.3s;
}

.btn:hover{
    transform:translateY(-2px);
    box-shadow:0 12px 30px #00ffb344;
}

/* footer */
.footer{
    margin-top:18px;
    text-align:center;
    font-size:.85rem;
    color:#9ecad3;
}

.footer a{
    color:#00e1ff;
    text-decoration:none;
    font-weight:600;
}

/* mobile */
@media(max-width:480px){
    .card{margin:16px;padding:28px 22px}
}
</style>
</head>

<body>

<form class="card">

    <div class="logo">
        <img src="img/logosombra.png">
    </div>

    <h2>Crie sua conta</h2>
    <p class="subtitle">Comece agora no GestãoPro</p>

    <div class="form-group">
        <i class="fa fa-building icon"></i>
        <input type="text" placeholder="Nome da empresa" required>
    </div>

    <div class="form-group">
        <i class="fa fa-envelope icon"></i>
        <input type="email" placeholder="Seu e-mail" required>
    </div>

    <div class="form-group">
        <i class="fa fa-id-card icon"></i>
        <input type="text" placeholder="CNPJ ou CPF" required>
    </div>

    <div class="form-group">
        <i class="fa fa-phone icon"></i>
        <input type="tel" placeholder="WhatsApp" required>
    </div>

    <div class="form-group">
        <i class="fa fa-map-marker-alt icon"></i>
        <input type="text" placeholder="Endereço" required>
    </div>

    <div class="form-group">
        <i class="fa fa-lock icon"></i>
        <input type="password" placeholder="Senha segura" required>
    </div>

    <button class="btn">Criar conta</button>

    <div class="footer">
        Já possui acesso? <a href="#">Entrar</a>
    </div>

</form>

</body>
</html>
